<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definition of gradients -->
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1A2D" />
      <stop offset="100%" stop-color="#C5000E" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C17D" />
      <stop offset="100%" stop-color="#A9843D" />
    </linearGradient>
  </defs>

  <!-- Background Glowing Sun -->
  <circle cx="50" cy="50" r="42" fill="url(#sunGrad)" />

  <!-- Minimalist Mount Fuji Silhouette inside the sun -->
  <path d="M 25 80 L 45 42 Q 50 38 55 42 L 75 80 Z" fill="#111111" />
  <!-- Fuji Snowcap -->
  <path d="M 43 46 L 47 54 L 50 51 L 53 54 L 57 46 Q 50 42 43 46 Z" fill="#FFFFFF" />

  <!-- Torii Gate Silhouette overlaying in the foreground -->
  <!-- Left Pillar -->
  <path d="M 36 85 L 36 48 Q 36 47 37 47 L 40 47 Q 41 47 41 48 L 41 85 Z" fill="url(#goldGrad)" />
  <!-- Right Pillar -->
  <path d="M 59 85 L 59 48 Q 59 47 60 47 L 63 47 Q 64 47 64 48 L 64 85 Z" fill="url(#goldGrad)" />
  
  <!-- Lower crossbar (Nuki) -->
  <path d="M 30 54 L 70 54 Q 71 54 71 56 L 71 58 Q 71 60 70 60 L 30 60 Q 29 60 29 58 L 29 56 Q 29 54 30 54 Z" fill="url(#goldGrad)" />
  
  <!-- Upper curved lintel (Kasagi & Shimagi) -->
  <path d="M 26 40 Q 50 44 74 40 Q 76 39 76 43 L 75 47 Q 50 51 25 47 L 24 43 Q 24 39 26 40 Z" fill="#111111" />
  
  <!-- Center support block (Gakuzuka) -->
  <rect x="48" y="46" width="4" height="8" fill="url(#goldGrad)" />
  
  <!-- Dynamic floating sakura petals -->
  <path d="M 22 28 Q 24 24 20 22 Q 18 25 22 28 Z" fill="#FFFFFF" opacity="0.85" />
  <path d="M 76 22 Q 78 18 74 16 Q 72 19 76 22 Z" fill="#FFFFFF" opacity="0.85" />
  <path d="M 80 50 Q 82 48 79 45 Q 77 47 80 50 Z" fill="#FFFFFF" opacity="0.6" />
</svg>
